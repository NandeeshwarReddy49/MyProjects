<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
    *{
        padding: 0;
        margin: 0;
    }
    body{
        background-color: rgba(75, 86, 242, 0.671);
    }
    form{
        height: 400px;
        width: 400px;
        border: none;
        border-radius: 10px;
        margin: 90px auto;
        display: flex;
        align-items: center;
        flex-direction: column;
        justify-content: center;
        gap: 13px;
        background-color: rgba(87, 91, 209, 0.671);
        box-shadow: rgba(14, 30, 37, 0.12) 0px 2px 4px 0px, rgba(14, 30, 37, 0.32) 0px 2px 16px 0px;
    }
    input{
        padding: 10px 20px;
        width: 250px;
        outline: none;
        border: none;
        border-radius: 10px;
    }
    input:focus{
        border-color: aqua;
        border: 1px solid;
    
    }
   
    p{
        margin-top: 20px;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    }
    a{
       font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
    button{
        width: 120px;
        padding: 8px 15px;
        margin-top: 20px;
        font-weight: bold;
        background-color: rgb(222, 182, 231);
        outline: none;
        border: none;
        border-radius: 10px;
        
    }
    button:hover{
        background-color: rgba(99, 241, 71, 0.553);
        color: aliceblue;
    }
    h1 {
		text-align: center;
		font-family: sans-serif;;
		text-decoration:underline;
		color:black;
}
</style>
</head>
<body>
		
		<form action="addstudent" method="post">
		<h1>Student Form</h1>
		<!-- <label>Id :</label> -->
		<input type="text" name="sid" placeholder="Student ID">
		<!-- <label>Name :</label> -->
		<input type="text" name="name" placeholder="Name">
		<!-- <label>Email :</label> -->
		<input type="email" name="email" placeholder="Email">
		<!-- <label>Password :</label> -->
		<input type="password" name="password" placeholder="Password">
		<!-- <label>Mobile Number :</label> -->
		<input type="tel" name="number" placeholder="Mobile Number">
		<button>submit</button>
		</form>
</body>
</html>
