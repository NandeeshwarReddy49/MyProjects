<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
    *{
        padding: 0;
        margin: 0;
    }
    body{
        background-color: rgb(47, 213, 213);
    }
    form{
        height: 300px;
        width: 400px;
        border: none;
        border-radius: 10px;
        margin: 90px auto;
        display: flex;
        align-items: center;
        flex-direction: column;
        justify-content: center;
        gap: 13px;
        background-color: rgba(0, 255, 255, 0.671);
        box-shadow: rgba(14, 30, 37, 0.12) 0px 2px 4px 0px, rgba(14, 30, 37, 0.32) 0px 2px 16px 0px;
    }
    input{
        padding: 10px 20px;
        width: 250px;
        outline: none;
        border: none;
        border-radius: 10px;
    }
    input:focus{
        border-color: aqua;
        border: 1px solid;
    
    }
    p{
        margin-top: 20px;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    }
    a{
       font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
    button{
        width: 120px;
        padding: 8px 15px;
        margin-top: 20px;
        font-weight: bold;
        background-color: rgb(142, 142, 184);
        outline: none;
        border: none;
        border-radius: 10px;
        
    }
    button:hover{
        background-color: rgba(0, 0, 0, 0.553);
        color: aliceblue;
    }
    h1{
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    }
</style>
</head>
<body>
	<form action="login" method="post">
	<h1>Login</h1>
	<input type="email" name="email" placeholder="Email">

	<input type="password" name="password" placeholder="Password">
	
	<button>Login</button>
	<p>Don't Have an Account...<a id="signup" href="signup.html">Signup</a></p>
	</form>
</body>
</html>
